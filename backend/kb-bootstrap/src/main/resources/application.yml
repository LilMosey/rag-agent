server:
  port: 8080

spring:
  application:
    name: rag-agent
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_kb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: enterprise_kb
    password: enterprise_kb123456
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  profiles:
    active: test

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  storage:
    minio:
      endpoint: http://localhost:9000
      bucket: enterprise-kb-files
      access-key: minioadmin
      secret-key: minioadmin123
  vector:
    milvus:
      host: localhost
      port: 19530
      database: default
      collection-prefix: enterprise_kb
      collection-name: enterprise_kb_chunk_v2
      bm25-enabled: true
#      collection-name: enterprise_kb_chunk
#      bm25-enabled: false
  index:
    scheduler:
      fixed-delay-ms: 5000
      batch-size: 10

rag:
  enrichment:
    enabled: true
#    provider: dashscope
#    model: qwen-plus
#    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    provider: deepseek
    model: deepseek-v4-flash
    api-key: yourKey
    base-url: https://api.deepseek.com
    max-questions: 3
    summary-max-chars: 200
    prompt-version: chunk_enrichment_v1
    mock-when-api-key-missing: true
  embedding:
    enabled: true
    provider: dashscope
    model: text-embedding-v4
    api-key: yourKey
    base-url: https://{WorkspaceId}.cn-beijing.maas.aliyuncs.com/api/v1 #以下为华北2（北京）地域的配置，调用时请将WorkspaceId替换为真实的业务空间ID，各地域的配置不同。
    dimension: 1024
    batch-size: 10
  query:
    provider: deepseek
    router-model: deepseek-v4-flash
    answer-model: deepseek-v4-flash
    api-key: yourKey
    base-url: https://api.deepseek.com
    router-confidence-threshold: 0.6
    retrieval-top-k: 10
    context-top-k: 5
  context:
    recent-message-limit: 6
    reuse-last-context-enabled: true
  retrieval:
    query-rewrite-enabled: true
    hyde-enabled: true
    multi-query-enabled: true
    bm25-enabled: true
    rerank-enabled: true
    rerank-model: gte-rerank-v2
    rerank-api-key: yourKey
    rerank-base-url: https://ws-hh3wm4lgkatqm4g0.cn-beijing.maas.aliyuncs.com/api/v1
    rerank-candidate-top-k: 30
    rerank-return-documents: false
    query-rewrite-history-message-limit: 6
    multi-query-count: 3
    dense-top-k: 10
    bm25-top-k: 10
    fusion-top-k: 10
    context-top-k: 5
    rrf-k: 60
    executor-core-size: 4
    executor-max-size: 8
    executor-queue-capacity: 100
